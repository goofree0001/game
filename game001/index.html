<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Dice Maze - Fixed</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; user-select: none; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #scoreUi {
            position: absolute; top: 15px; left: 15px; color: #ffd700;
            font-family: sans-serif; font-size: 16px; font-weight: bold;
            background-color: rgba(0, 0, 0, 0.7); padding: 8px 15px; border-radius: 5px;
            border: 1px solid #ffd700; pointer-events: none; z-index: 10;
        }

        #clearUi {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); color: #00ffcc;
            font-family: sans-serif; font-size: 36px; font-weight: bold;
            text-shadow: 0 0 15px #00ffcc; background-color: rgba(0,0,0,0.85);
            padding: 15px 30px; border-radius: 10px; border: 2px solid #00ffcc;
            pointer-events: none; z-index: 20; text-align: center; width: 70%;
        }
    </style>
    <script src="three.min.js"></script>
</head>
<body>

<div id="scoreUi">Stage 1 - Score: 0 / 0</div>
<div id="clearUi">STAGE CLEAR!</div>

<script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    // 💡 縦長画面でも迷路の全体がしっかり画面内に収まるよう、カメラの距離を引きに調整
    camera.position.set(0, 15, 12);
    camera.lookAt(0, 0, -1);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 12, 8);
    scene.add(dirLight);
    scene.add(new THREE.AmbientLight(0x555555));

    const grid = new THREE.GridHelper(24, 24, 0x555555, 0x333333);
    grid.position.set(0.5, -0.5, 0.5);
    scene.add(grid);

    function createDiceMaterials() {
        const mats = [];
        for (let i = 1; i <= 6; i++) {
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, 128, 128);
            ctx.fillStyle = (i === 1) ? '#ff0000' : '#111111';
            const radius = (i === 1) ? 22 : 12;

            if (i === 1) {
                ctx.beginPath(); ctx.arc(64, 64, radius, 0, Math.PI * 2); ctx.fill();
            } else if (i === 2) {
                ctx.beginPath(); ctx.arc(32, 32, radius, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(96, 96, radius, 0, Math.PI * 2); ctx.fill();
            } else if (i === 3) {
                ctx.beginPath(); ctx.arc(32, 32, radius, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(64, 64, radius, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(96, 96, radius, 0, Math.PI * 2); ctx.fill();
            } else if (i === 4) {
                ctx.beginPath(); ctx.arc(32, 32, radius, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(96, 32, radius, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(32, 96, radius, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(96, 96, radius, 0, Math.PI * 2); ctx.fill();
            } else if (i === 5) {
                ctx.beginPath(); ctx.arc(32, 32, radius, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(96, 32, radius, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(64, 64, radius, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(32, 96, radius, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(96, 96, radius, 0, Math.PI * 2); ctx.fill();
            } else if (i === 6) {
                ctx.beginPath(); ctx.arc(32, 32, radius, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(96, 32, radius, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(32, 64, radius, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(96, 64, radius, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(32, 96, radius, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(96, 96, radius, 0, Math.PI * 2); ctx.fill();
            }
            ctx.strokeStyle = '#dddddd'; ctx.lineWidth = 6; ctx.strokeRect(3, 3, 122, 122);
            const texture = new THREE.CanvasTexture(canvas);
            mats.push(new THREE.MeshStandardMaterial({ map: texture, roughness: 0.2 }));
        }
        return [mats[0], mats[1], mats[2], mats[3], mats[4], mats[5]];
    }

    const cubeGeo = new THREE.BoxGeometry(1.0, 1.0, 1.0);
    const playerMaterials = createDiceMaterials();
    const player = new THREE.Mesh(cubeGeo, playerMaterials);
    scene.add(player);

    const wallMat = new THREE.MeshStandardMaterial({ color: 0xff3333 });
    const coinGeo = new THREE.CylinderGeometry(0.25, 0.25, 0.05, 16);
    const coinMat = new THREE.MeshStandardMaterial({ color: 0xfff000, roughness: 0.1, metalness: 0.8 });

    let currentStage = 1;
    let collectedCount = 0;
    let totalCoins = 0;
    let walls = [];
    let coins = [];

    function generateDiggingMaze(stageNum) {
        walls.forEach(w => scene.remove(w));
        coins.forEach(c => scene.remove(c));
        walls = []; coins = [];

        if (stageNum > 5) {
            document.getElementById('clearUi').innerText = "ALL CLEAR!!";
            document.getElementById('clearUi').style.display = 'block';
            return;
        }

        const mapSize = 11;
        const mazeGrid = [];

        for (let x = 0; x < mapSize; x++) {
            mazeGrid[x] = [];
            for (let z = 0; z < mapSize; z++) { mazeGrid[x][z] = 1; }
        }

        const startX = 1; const startZ = 1;
        mazeGrid[startX][startZ] = 0;
        const dcl = [{x: startX, z: startZ}];

        while (dcl.length > 0) {
            const current = dcl[dcl.length - 1];
            const dirs = [];
            if (current.x - 2 > 0 && mazeGrid[current.x - 2][current.z] === 1) dirs.push({x: -1, z: 0});
            if (current.x + 2 < mapSize - 1 && mazeGrid[current.x + 2][current.z] === 1) dirs.push({x: 1, z: 0});
            if (current.z - 2 > 0 && mazeGrid[current.x][current.z - 2] === 1) dirs.push({x: 0, z: -1});
            if (current.z + 2 < mapSize - 1 && mazeGrid[current.x][current.z + 2] === 1) dirs.push({x: 0, z: 1});

            if (dirs.length > 0) {
                const d = dirs[Math.floor(Math.random() * dirs.length)];
                mazeGrid[current.x + d.x][current.z + d.z] = 0;
                mazeGrid[current.x + d.x * 2][current.z + d.z * 2] = 0;
                dcl.push({x: current.x + d.x * 2, z: current.z + d.z * 2});
            } else { dcl.pop(); }
        }

        for (let x = 0; x < mapSize; x++) {
            for (let z = 0; z < mapSize; z++) {
                let worldX = x - 5; let worldZ = z - 5;
                if (mazeGrid[x][z] === 1) {
                    const wall = new THREE.Mesh(cubeGeo, wallMat);
                    wall.position.set(worldX, 0, worldZ); scene.add(wall); walls.push(wall);
                } else {
                    if (!(x === 1 && z === 1) && Math.random() < 0.20) {
                        const coin = new THREE.Mesh(coinGeo, coinMat);
                        coin.position.set(worldX, 0, worldZ); coin.rotation.x = Math.PI / 2;
                        scene.add(coin); coins.push(coin);
                    }
                }
            }
        }

        if (coins.length === 0) {
            const coin = new THREE.Mesh(coinGeo, coinMat);
            coin.position.set(3, 0, 3); coin.rotation.x = Math.PI / 2;
            scene.add(coin); coins.push(coin);
        }

        player.position.set(-4, 0, -4);
        player.quaternion.set(0, 0, 0, 1);
        finalTargetX = -4; finalTargetZ = -4;

        collectedCount = 0; totalCoins = coins.length;
        document.getElementById('scoreUi').innerText = `Stage ${stageNum} - Score: ${collectedCount} / ${totalCoins}`;
        document.getElementById('clearUi').style.display = 'none';
        isStageClearing = false;
    }
    // 6. マウス・タッチ（スワイプ）による目的地の検知
    let plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    let raycaster = new THREE.Raycaster();
    let mouse = new THREE.Vector2();
    let clickPos = new THREE.Vector3();

    // 移動および進行の管理変数
    let isMoving = false;
    let isStageClearing = false;
    let moveTimer = 0;
    const moveDuration = 10;
    
    let startPos = new THREE.Vector3();
    let nextPos = new THREE.Vector3();
    let rotAxis = new THREE.Vector3();
    let startQuaternion = new THREE.Quaternion();

    let finalTargetX = 0;
    let finalTargetZ = 0;

    // パソコン（マウス）用のクリックイベント
    window.addEventListener('mousedown', (e) => { 
        handleInput(e.clientX, e.clientY); 
    });
    
    // 💡 【修正】指のタッチ座標を「e.touches[0]」から正確に取得するようにバグを修正
    window.addEventListener('touchstart', (e) => {
        if (e.touches && e.touches.length > 0) {
            handleInput(e.touches[0].clientX, e.touches[0].clientY);
        }
    }, { passive: false });

    window.addEventListener('touchmove', (e) => {
        // スマホ画面の勝手なスクロールや跳ね返り現象を100%禁止
        e.preventDefault(); 
        if (e.touches && e.touches.length > 0 && !isMoving && !isStageClearing) {
            handleInput(e.touches[0].clientX, e.touches[0].clientY);
        }
    }, { passive: false });

    // 共通の入力座標変換処理
    function handleInput(clientX, clientY) {
        if (isMoving || isStageClearing) return;

        mouse.x = (clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        raycaster.ray.intersectPlane(plane, clickPos);

        finalTargetX = Math.round(clickPos.x);
        finalTargetZ = Math.round(clickPos.z);
    }

    // 1マスずつの進路をジグザグに自動計算する関数
    function planNextStep() {
        if (player.position.x === finalTargetX && player.position.z === finalTargetZ) return;

        let diffX = finalTargetX - player.position.x;
        let diffZ = finalTargetZ - player.position.z;
        let dirX = 0; let dirZ = 0;

        if (Math.abs(diffX) >= Math.abs(diffZ) && diffX !== 0) {
            dirX = diffX > 0 ? 1 : -1; rotAxis.set(0, 0, -dirX);
        } else if (diffZ !== 0) {
            dirZ = diffZ > 0 ? 1 : -1; rotAxis.set(dirZ, 0, 0);
        }

        nextPos.copy(player.position);
        nextPos.x += dirX; nextPos.z += dirZ;

        let canMove = true;
        walls.forEach(w => {
            if (Math.abs(nextPos.x - w.position.x) < 0.5 && Math.abs(nextPos.z - w.position.z) < 0.5) canMove = false;
        });

        if (!canMove) {
            dirX = 0; dirZ = 0;
            if (player.position.x !== finalTargetX && Math.abs(diffX) < Math.abs(diffZ)) {
                dirX = diffX > 0 ? 1 : -1; rotAxis.set(0, 0, -dirX);
            } else if (player.position.z !== finalTargetZ) {
                dirZ = diffZ > 0 ? 1 : -1; rotAxis.set(dirZ, 0, 0);
            }
            nextPos.copy(player.position);
            nextPos.x += dirX; nextPos.z += dirZ;

            canMove = true;
            walls.forEach(w => {
                if (Math.abs(nextPos.x - w.position.x) < 0.5 && Math.abs(nextPos.z - w.position.z) < 0.5) canMove = false;
            });
        }

        if (!canMove || (dirX === 0 && dirZ === 0)) {
            finalTargetX = player.position.x; finalTargetZ = player.position.z;
            return;
        }

        startPos.copy(player.position);
        startQuaternion.copy(player.quaternion);
        isMoving = true;
        moveTimer = 0;
    }

    // コインの獲得判定とクリア処理
    function checkCoinCollision() {
        for (let i = coins.length - 1; i >= 0; i--) {
            const coin = coins[i];
            if (Math.abs(player.position.x - coin.position.x) < 0.1 && Math.abs(player.position.z - coin.position.z) < 0.1) {
                scene.remove(coin);
                coins.splice(i, 1);
                
                collectedCount++;
                document.getElementById('scoreUi').innerText = `Stage ${currentStage} - Score: ${collectedCount} / ${totalCoins}`;
                
                if (collectedCount === totalCoins) {
                    isStageClearing = true;
                    document.getElementById('clearUi').innerText = "STAGE CLEAR!";
                    document.getElementById('clearUi').style.display = 'block';
                    
                    setTimeout(() => {
                        currentStage++;
                        generateDiggingMaze(currentStage);
                    }, 2000);
                }
            }
        }
    }

    generateDiggingMaze(currentStage);

    // 7. ゲームメインループ
    function animate() {
        requestAnimationFrame(animate);

        coins.forEach(coin => {
            coin.rotation.z += 0.04;
        });

        if (!isMoving && !isStageClearing) {
            planNextStep();
        }

        if (isMoving) {
            moveTimer++;
            let progress = moveTimer / moveDuration;

            if (progress >= 1.0) {
                isMoving = false;
                player.position.copy(nextPos);
                let finalRot = new THREE.Quaternion().setFromAxisAngle(rotAxis, Math.PI / 2);
                player.quaternion.copy(startQuaternion).premultiply(finalRot);
                
                checkCoinCollision();
            } else {
                player.position.lerpVectors(startPos, nextPos, progress);
                let currentAngle = (Math.PI / 2) * progress;
                let deltaRot = new THREE.Quaternion().setFromAxisAngle(rotAxis, currentAngle);
                player.quaternion.copy(startQuaternion).premultiply(deltaRot);
            }
        }
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
