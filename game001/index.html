<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Dice Maze - Dynamic Enemies</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; user-select: none; touch-action: none; -webkit-user-select: none; }
        canvas { display: block; width: 100vw; height: 100vh; cursor: pointer; }
        
        #scoreUi {
            position: absolute; top: 15px; left: 15px; color: #ffd700;
            font-family: monospace; font-size: 18px; font-weight: bold;
            background-color: rgba(0, 0, 0, 0.6); padding: 8px 15px; border-radius: 5px;
            border: 1px solid #ffd700; pointer-events: none; z-index: 10;
        }

        #lifeUi {
            position: absolute; top: 60px; left: 15px; color: #ff3366;
            font-family: sans-serif; font-size: 18px; font-weight: bold;
            background-color: rgba(0, 0, 0, 0.6); padding: 6px 15px; border-radius: 5px;
            border: 1px solid #ff3366; pointer-events: none; z-index: 10;
        }

        #clearUi {
            display: none; position: absolute; top: 45%; left: 50%;
            transform: translate(-50%, -50%); color: #00ffcc;
            font-family: sans-serif; font-size: 44px; font-weight: bold;
            text-shadow: 0 0 15px #00ffcc; background-color: rgba(0,0,0,0.8);
            padding: 20px 50px; border-radius: 15px; border: 3px solid #00ffcc;
            pointer-events: none; z-index: 20; text-align: center; width: 75%;
        }

        #retryBtn {
            display: none; position: absolute; top: 65%; left: 50%;
            transform: translate(-50%, -50%); color: #ffffff;
            font-family: sans-serif; font-size: 24px; font-weight: bold;
            background-color: #ff3333; padding: 12px 35px; border-radius: 10px;
            border: 2px solid #ffffff; cursor: pointer; z-index: 30;
            box-shadow: 0 0 15px #ff3333; text-align: center;
        }

        #startScreen {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: rgba(0, 0, 0, 0.75); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 40;
        }

        #startBtn {
            color: #ffffff; font-family: sans-serif; font-size: 32px; font-weight: bold;
            background-color: #00ffcc; padding: 15px 50px; border-radius: 15px;
            border: 3px solid #ffffff; cursor: pointer; box-shadow: 0 0 25px #00ffcc;
            text-align: center;
        }
    </style>
    <script src="three.min.js"></script>
</head>
<body>

<div id="scoreUi">Stage 1 - Score: 0 / 10</div>
<div id="lifeUi">Life: ❤️❤️❤️</div>
<div id="clearUi">STAGE CLEAR!</div>
<button id="retryBtn" onclick="onClickRetry()">RETRY</button>

<div id="startScreen">
    <button id="startBtn" onclick="onClickStart()">START</button>
</div>

<script {nonce}>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    
    function updateCameraPosition() {
        const aspect = window.innerWidth / window.innerHeight;
        if (aspect < 1.0) {
            const pullBack = 11 / aspect;
            camera.position.set(0, pullBack, pullBack);
        } else {
            camera.position.set(0, 11, 11);
        }
        camera.lookAt(0, 0, -1);
    }
    updateCameraPosition();

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 12, 8); scene.add(dirLight);
    scene.add(new THREE.AmbientLight(0x555555));

    const grid = new THREE.GridHelper(24, 24, 0x555555, 0x333333);
    grid.position.set(0.5, -0.5, 0.5); scene.add(grid);
    // 1. サイコロの大きな目を自動描画するシステム
    function createDiceMaterials() {
        const mats = [];
        for (let i = 1; i <= 6; i++) {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128; const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, 128, 128);
            ctx.fillStyle = (i === 1) ? '#ff0000' : '#111111';
            const radius = (i === 1) ? 22 : 12;

            if (i === 1) { ctx.beginPath(); ctx.arc(64, 64, radius, 0, Math.PI * 2); ctx.fill(); }
            else if (i === 2) { ctx.beginPath(); ctx.arc(32, 32, radius, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(96, 96, radius, 0, Math.PI * 2); ctx.fill(); }
            else if (i === 3) { ctx.beginPath(); ctx.arc(32, 32, radius, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(64, 64, radius, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(96, 96, radius, 0, Math.PI * 2); ctx.fill(); }
            else if (i === 4) { ctx.beginPath(); ctx.arc(32, 32, radius, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(96, 32, radius, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(32, 96, radius, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(96, 96, radius, 0, Math.PI * 2); ctx.fill(); }
            else if (i === 5) { ctx.beginPath(); ctx.arc(32, 32, radius, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(96, 32, radius, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(64, 64, radius, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(32, 96, radius, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(96, 96, radius, 0, Math.PI * 2); ctx.fill(); }
            else if (i === 6) { ctx.beginPath(); ctx.arc(32, 32, radius, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(96, 32, radius, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(32, 64, radius, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(96, 64, radius, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(32, 96, radius, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(96, 96, radius, 0, Math.PI * 2); ctx.fill(); }
            
            ctx.strokeStyle = '#dddddd'; ctx.lineWidth = 6; ctx.strokeRect(3, 3, 122, 122);
            const texture = new THREE.CanvasTexture(canvas);
            mats.push(new THREE.MeshStandardMaterial({ map: texture, roughness: 0.2 }));
        }
        return mats;
    }

    const cubeGeo = new THREE.BoxGeometry(1.0, 1.0, 1.0);
    const playerMaterials = createDiceMaterials();
    const player = new THREE.Mesh(cubeGeo, playerMaterials);
    scene.add(player);

    const wallMat = new THREE.MeshStandardMaterial({ color: 0xff3333 });
    const coinGeo = new THREE.CylinderGeometry(0.25, 0.25, 0.05, 16);
    const coinMat = new THREE.MeshStandardMaterial({ color: 0xfff000, roughness: 0.1, metalness: 0.8 });

    const floorGeo = new THREE.PlaneGeometry(1.0, 1.0);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.6 });

    // 💡 最大4匹の赤いトゲトゲ球体エネミー（enemy1〜4）を定義
    const enemyGeo = new THREE.SphereGeometry(0.4, 8, 8);
    const enemyMat = new THREE.MeshStandardMaterial({ color: 0xaa0000, roughness: 0.4, metalness: 0.3 });
    const enemy1 = new THREE.Mesh(enemyGeo, enemyMat);
    const enemy2 = new THREE.Mesh(enemyGeo, enemyMat);
    const enemy3 = new THREE.Mesh(enemyGeo, enemyMat);
    const enemy4 = new THREE.Mesh(enemyGeo, enemyMat);

    let currentStage = 1; let collectedCount = 0; let totalCoins = 10; let walls = []; let coins = []; let floorPlanes = [];
    let isMoving = false; let isStageClearing = false; let isGameOver = false; let moveTimer = 0; const moveDuration = 10;
    let startPos = new THREE.Vector3(); let nextPos = new THREE.Vector3(); let rotAxis = new THREE.Vector3(); let startQuaternion = new THREE.Quaternion();
    let finalTargetX = 0; let finalTargetZ = 0;

    let playerLife = 3;
    let isGamePlaying = false;

    const enemyRoute = [
        {x:-4, z:-4}, {x:-3, z:-4}, {x:-2, z:-4}, {x:-1, z:-4}, {x:0, z:-4}, {x:1, z:-4}, {x:2, z:-4}, {x:3, z:-4}, {x:4, z:-4},
        {x:4, z:-3}, {x:4, z:-2}, {x:4, z:-1}, {x:4, z:0}, {x:4, z:1}, {x:4, z:2}, {x:4, z:3}, {x:4, z:4},
        {x:3, z:4}, {x:2, z:4}, {x:1, z:4}, {x:0, z:4}, {x:-1, z:4}, {x:-2, z:4}, {x:-3, z:4}, {x:-4, z:4},
        {x:-4, z:3}, {x:-4, z:2}, {x:-4, z:1}, {x:-4, z:0}, {x:-4, z:-1}, {x:-4, z:-2}, {x:-4, z:-3}
    ];

    // 💡 各敵キャラクターのパトロール用インデックスを定義
    let e1Idx = 4; let e2Idx = 20; let e3Idx = 12; let e4Idx = 28;
    let enemyMoveTimer = 0; const enemyMoveInterval = 15;
    let e1Start = new THREE.Vector3(); let e1Next = new THREE.Vector3();
    let e2Start = new THREE.Vector3(); let e2Next = new THREE.Vector3();
    let e3Start = new THREE.Vector3(); let e3Next = new THREE.Vector3();
    let e4Start = new THREE.Vector3(); let e4Next = new THREE.Vector3();

    // 2. 穴掘り法迷路の生成ロジック
    function generateDiggingMaze(stageNum) {
        walls.forEach(w => scene.remove(w)); coins.forEach(c => scene.remove(c)); floorPlanes.forEach(f => scene.remove(f));
        walls = []; coins = []; floorPlanes = []; 
        scene.remove(enemy1); scene.remove(enemy2); scene.remove(enemy3); scene.remove(enemy4);

        if (stageNum > 5) { 
            isGameOver = true; isGamePlaying = false;
            document.getElementById('clearUi').innerText = "ALL CLEAR!!"; 
            document.getElementById('clearUi').style.display = 'block'; 
            document.getElementById('retryBtn').style.display = 'block';
            return; 
        }
        
        const mapSize = 11; const mazeGrid = [];
        for (let x = 0; x < mapSize; x++) { mazeGrid.push([]); for (let z = 0; z < mapSize; z++) { mazeGrid[x].push(1); } }
        
        renderer.setClearColor(0x111111, 1.0);
        
        // 💡 定数上書きエラー（mazeGrid=0）は綺麗に消去されています
        let dcl = [{x: 1, z: 1}];
        while (dcl.length > 0) {
            const cur = dcl[dcl.length - 1]; const dirs = [];
            if (cur.x - 2 > 0 && mazeGrid[cur.x - 2][cur.z] === 1) dirs.push({x: -1, z: 0});
            if (cur.x + 2 < mapSize - 1 && mazeGrid[cur.x + 2][cur.z] === 1) dirs.push({x: 1, z: 0});
            if (cur.z - 2 > 0 && mazeGrid[cur.x][cur.z - 2] === 1) dirs.push({x: 0, z: -1});
            
            let gridLine = mazeGrid[cur.x];
            if (cur.z + 2 < mapSize - 1 && gridLine[cur.z + 2] === 1) dirs.push({x: 0, z: 1});
            if (dirs.length > 0) {
                const d = dirs[Math.floor(Math.random() * dirs.length)];
                mazeGrid[cur.x + d.x][cur.z + d.z] = 0; mazeGrid[cur.x + d.x * 2][cur.z + d.z * 2] = 0;
                dcl.push({x: cur.x + d.x * 2, z: cur.z + d.z * 2});
            } else { dcl.pop(); }
        }
        
        const coinCandidates = [];
        for (let x = 0; x < mapSize; x++) {
            for (let z = 0; z < mapSize; z++) {
                let wX = x - 5; let wZ = z - 5;
                if (x === 1 || x === mapSize - 2 || z === 1 || z === mapSize - 2) { if (x > 0 && x < mapSize - 1 && z > 0 && z < mapSize - 1) mazeGrid[x][z] = 0; }
                if (mazeGrid[x][z] === 1) { const w = new THREE.Mesh(cubeGeo, wallMat); w.position.set(wX, 0, wZ); scene.add(w); walls.push(w); }
                else {
                    const f = new THREE.Mesh(floorGeo, floorMat); f.position.set(wX, -0.49, wZ); f.rotation.x = -Math.PI / 2;
                    scene.add(f); floorPlanes.push(f);
                    if (!(wX === -4 && wZ === -4)) { coinCandidates.push({x: wX, z: wZ}); }
                }
            }
        }

        for (let i = coinCandidates.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1)); const temp = coinCandidates[i]; coinCandidates[i] = coinCandidates[j]; coinCandidates[j] = temp;
        }

        const finalCoinCount = Math.min(10, coinCandidates.length);
        for (let i = 0; i < finalCoinCount; i++) {
            const pos = coinCandidates[i]; const c = new THREE.Mesh(coinGeo, coinMat); c.position.set(pos.x, 0, pos.z); c.rotation.x = Math.PI / 2; scene.add(c); coins.push(c);
        }

        player.position.set(-4, 0, -4); player.quaternion.set(0, 0, 0, 1); finalTargetX = -4; finalTargetZ = -4;
        
        // 💡【新配置システム】初期インデックスをリセット
        e1Idx = 4; e2Idx = 20; e3Idx = 12; e4Idx = 28;

        // 💡 ステージ数に応じた（ステージ-1）匹の敵の生成・配置
        if (stageNum >= 2) { // 2面：上中央（1匹）
            enemy1.position.set(enemyRoute[e1Idx].x, 0, enemyRoute[e1Idx].z); scene.add(enemy1);
            e1Start.copy(enemy1.position); e1Next.copy(enemy1.position);
        }
        if (stageNum >= 3) { // 3面：上中央、下中央（2匹）
            enemy2.position.set(enemyRoute[e2Idx].x, 0, enemyRoute[e2Idx].z); scene.add(enemy2);
            e2Start.copy(enemy2.position); e2Next.copy(enemy2.position);
        }
        if (stageNum >= 4) { // 4面：上中央、右中央、下中央（3匹）
            enemy3.position.set(enemyRoute[e3Idx].x, 0, enemyRoute[e3Idx].z); scene.add(enemy3);
            e3Start.copy(enemy3.position); e3Next.copy(enemy3.position);
        }
        if (stageNum >= 5) { // 5面：上中央、右中央、下中央、左中央（4匹を完全同時出現！）
            enemy4.position.set(enemyRoute[e4Idx].x, 0, enemyRoute[e4Idx].z); scene.add(enemy4);
            e4Start.copy(enemy4.position); e4Next.copy(enemy4.position);
        }

        enemyMoveTimer = 0;
        collectedCount = 0; totalCoins = coins.length;
        document.getElementById('scoreUi').innerText = `Stage ${currentStage} - Score: ${collectedCount} / ${totalCoins}`;
        let hearts = ""; for(let i=0; i<playerLife; i++) hearts += "❤️"; document.getElementById('lifeUi').innerText = `Life: ${hearts}`;
        document.getElementById('clearUi').style.display = 'none'; document.getElementById('retryBtn').style.display = 'none';
        isStageClearing = false; isGameOver = false;
    }
    // 3. マウスクリックおよびスマホの指タッチによる目的地の検知
    let plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    let raycaster = new THREE.Raycaster();
    let mouse = new THREE.Vector2();
    let clickPos = new THREE.Vector3();

    window.addEventListener('pointerdown', (e) => { handlePointerInput(e.clientX, e.clientY); });
    window.addEventListener('pointermove', (e) => { 
        if (e.buttons === 1) handlePointerInput(e.clientX, e.clientY); 
    });

    function handlePointerInput(clientX, clientY) {
        if (!isGamePlaying || isMoving || isStageClearing || isGameOver) return;
        mouse.x = (clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        raycaster.ray.intersectPlane(plane, clickPos);
        finalTargetX = Math.round(clickPos.x);
        finalTargetZ = Math.round(clickPos.z);
    }

    function onClickStart() { isGamePlaying = true; document.getElementById('startScreen').style.display = 'none'; }
    function onClickRetry() { playerLife = 3; currentStage = 1; generateDiggingMaze(currentStage); isGamePlaying = false; document.getElementById('startScreen').style.display = 'flex'; }

    function planNextStep() {
        if (player.position.x === finalTargetX && player.position.z === finalTargetZ) return;
        let diffX = finalTargetX - player.position.x;
        let diffZ = finalTargetZ - player.position.z;
        let dX = 0; let dZ = 0;
        
        if (Math.abs(diffX) >= Math.abs(diffZ) && diffX !== 0) { dX = diffX > 0 ? 1 : -1; rotAxis.set(0, 0, -dX); }
        else if (diffZ !== 0) { dZ = diffZ > 0 ? 1 : -1; rotAxis.set(dZ, 0, 0); }
        
        nextPos.copy(player.position); nextPos.x += dX; nextPos.z += dZ;
        let cM = true; walls.forEach(w => { if (Math.abs(nextPos.x - w.position.x) < 0.5 && Math.abs(nextPos.z - w.position.z) < 0.5) cM = false; });
        
        if (!cM) {
            dX = 0; dZ = 0; if (player.position.x !== finalTargetX && Math.abs(diffX) < Math.abs(diffZ)) { dX = diffX > 0 ? 1 : -1; rotAxis.set(0, 0, -dX); } else if (player.position.z !== finalTargetZ) { dZ = diffZ > 0 ? 1 : -1; rotAxis.set(dZ, 0, 0); }
            nextPos.copy(player.position); nextPos.x += dX; nextPos.z += dZ; cM = true;
            walls.forEach(w => { if (Math.abs(nextPos.x - w.position.x) < 0.5 && Math.abs(nextPos.z - w.position.z) < 0.5) cM = false; });
        }
        
        if (!cM || (dX === 0 && dZ === 0)) { finalTargetX = player.position.x; finalTargetZ = player.position.z; return; }
        startPos.copy(player.position); startQuaternion.copy(player.quaternion); isMoving = true; moveTimer = 0;
    }

    // 💡【最大4匹対応】プレイヤーとアクティブな敵の衝突判定
    function checkEnemyCollision() {
        if (currentStage === 1) return;

        let hit = false;
        
        // ステージ数（出現数）に応じて、対応する敵との距離を個別にチェック
        if (currentStage >= 2) {
            let dx = player.position.x - enemy1.position.x; let dz = player.position.z - enemy1.position.z;
            if (Math.sqrt(dx * dx + dz * dz) < 0.6) hit = true;
        }
        if (currentStage >= 3 && !hit) {
            let dx = player.position.x - enemy2.position.x; let dz = player.position.z - enemy2.position.z;
            if (Math.sqrt(dx * dx + dz * dz) < 0.6) hit = true;
        }
        if (currentStage >= 4 && !hit) {
            let dx = player.position.x - enemy3.position.x; let dz = player.position.z - enemy3.position.z;
            if (Math.sqrt(dx * dx + dz * dz) < 0.6) hit = true;
        }
        if (currentStage >= 5 && !hit) {
            let dx = player.position.x - enemy4.position.x; let dz = player.position.z - enemy4.position.z;
            if (Math.sqrt(dx * dx + dz * dz) < 0.6) hit = true;
        }

        if (hit) {
            isGameOver = true; playerLife--;
            let hearts = ""; for(let i=0; i<playerLife; i++) hearts += "❤️"; if (hearts === "") hearts = "NONE";
            document.getElementById('lifeUi').innerText = `Life: ${hearts}`;
            
            if (playerLife > 0) {
                document.getElementById('clearUi').innerText = "MISS!"; document.getElementById('clearUi').style.display = 'block';
                setTimeout(() => { generateDiggingMaze(currentStage); isGamePlaying = false; document.getElementById('startScreen').style.display = 'flex'; }, 1500);
            } else {
                document.getElementById('clearUi').innerText = "GAME OVER"; document.getElementById('clearUi').style.display = 'block'; document.getElementById('retryBtn').style.display = 'block';
            }
        }
    }

    function checkCoinCollision() {
        if (!coins || coins.length === 0) return;

        for (let i = coins.length - 1; i >= 0; i--) {
            if (!coins[i]) continue;
            if (Math.abs(player.position.x - coins[i].position.x) < 0.1 && Math.abs(player.position.z - coins[i].position.z) < 0.1) {
                scene.remove(coins[i]); coins.splice(i, 1); collectedCount++;
                document.getElementById('scoreUi').innerText = `Stage ${currentStage} - Score: ${collectedCount} / ${totalCoins}`;
                
                if (collectedCount === totalCoins) {
                    isStageClearing = true;
                    if (currentStage === 5) {
                        isGameOver = true; isGamePlaying = false;
                        document.getElementById('clearUi').innerText = "ALL CLEAR!!"; document.getElementById('clearUi').style.display = 'block'; document.getElementById('retryBtn').style.display = 'block';
                    } else {
                        document.getElementById('clearUi').innerText = "STAGE CLEAR!"; document.getElementById('clearUi').style.display = 'block';
                        setTimeout(() => { currentStage++; generateDiggingMaze(currentStage); isGamePlaying = false; document.getElementById('startScreen').style.display = 'flex'; }, 2000);
                    }
                }
            }
        }
    }

    generateDiggingMaze(currentStage);

    // 4. ゲームメインループ
    function animate() {
        requestAnimationFrame(animate); 
        if (coins && coins.length > 0) {
            coins.forEach(c => { if(c) c.rotation.z += 0.04; }); 
        }
        
        // 存在する敵オブジェクトのみ回転
        enemy1.rotation.y += 0.05; enemy1.rotation.x += 0.02;
        enemy2.rotation.y += 0.05; enemy2.rotation.x += 0.02;
        enemy3.rotation.y += 0.05; enemy3.rotation.x += 0.02;
        enemy4.rotation.y += 0.05; enemy4.rotation.x += 0.02;
        
        if (isGamePlaying && !isGameOver && !isStageClearing) {
            enemyMoveTimer++; 
            let enemyProgress = enemyMoveTimer / enemyMoveInterval;
            
            if (enemyProgress >= 1.0) {
                // 各自の次マスインデックスを更新・座標設定
                if (currentStage >= 2) {
                    e1Idx = (e1Idx + 1) % enemyRoute.length; let n1 = (e1Idx + 1) % enemyRoute.length;
                    e1Start.set(enemyRoute[e1Idx].x, 0, enemyRoute[e1Idx].z); e1Next.set(enemyRoute[n1].x, 0, enemyRoute[n1].z);
                    enemy1.position.copy(e1Start);
                }
                if (currentStage >= 3) {
                    e2Idx = (e2Idx + 1) % enemyRoute.length; let n2 = (e2Idx + 1) % enemyRoute.length;
                    e2Start.set(enemyRoute[e2Idx].x, 0, enemyRoute[e2Idx].z); e2Next.set(enemyRoute[n2].x, 0, enemyRoute[n2].z);
                    enemy2.position.copy(e2Start);
                }
                if (currentStage >= 4) {
                    e3Idx = (e3Idx + 1) % enemyRoute.length; let n3 = (e3Idx + 1) % enemyRoute.length;
                    e3Start.set(enemyRoute[e3Idx].x, 0, enemyRoute[e3Idx].z); e3Next.set(enemyRoute[n3].x, 0, enemyRoute[n3].z);
                    enemy3.position.copy(e3Start);
                }
                if (currentStage >= 5) {
                    e4Idx = (e4Idx + 1) % enemyRoute.length; let n4 = (e4Idx + 1) % enemyRoute.length;
                    e4Start.set(enemyRoute[e4Idx].x, 0, enemyRoute[e4Idx].z); e4Next.set(enemyRoute[n4].x, 0, enemyRoute[n4].z);
                    enemy4.position.copy(e4Start);
                }
                enemyMoveTimer = 0;
            } else {
                // ぬるぬる補間移動
                if (currentStage >= 2) enemy1.position.lerpVectors(e1Start, e1Next, enemyProgress);
                if (currentStage >= 3) enemy2.position.lerpVectors(e2Start, e2Next, enemyProgress);
                if (currentStage >= 4) enemy3.position.lerpVectors(e3Start, e3Next, enemyProgress);
                if (currentStage >= 5) enemy4.position.lerpVectors(e4Start, e4Next, enemyProgress);
            }
            
            checkEnemyCollision();
        }
        
        if (isGamePlaying && !isMoving && !isStageClearing && !isGameOver) planNextStep();
        
        if (isMoving) {
            moveTimer++; let progress = moveTimer / moveDuration;
            if (progress >= 1.0) {
                isMoving = false; player.position.copy(nextPos); player.quaternion.copy(startQuaternion).premultiply(new THREE.Quaternion().setFromAxisAngle(rotAxis, Math.PI / 2));
                if (!isGameOver) checkCoinCollision();
            } else { player.position.lerpVectors(startPos, nextPos, progress); player.quaternion.copy(startQuaternion).premultiply(new THREE.Quaternion().setFromAxisAngle(rotAxis, (Math.PI / 2) * progress)); }
        }
        renderer.render(scene, camera);
    }
    animate();
    
    window.addEventListener('resize', () => { 
        camera.aspect = window.innerWidth / window.innerHeight; 
        camera.updateProjectionMatrix(); 
        renderer.setSize(window.innerWidth, window.innerHeight); 
        updateCameraPosition(); 
    });
</script>
